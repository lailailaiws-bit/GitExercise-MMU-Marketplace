<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block head %}
    
    {% endblock %}
</head>
<body>
    
    <div class="nav">
        <img src="{{ url_for('static', filename='photos/mmu-logo.png')}}" alt="MMU Logo" class="logo">
        
        <form class="search_bar" action="{{ url_for('search') }}" method="get">
            <input type="text" name="q" placeholder="Search..." class="search-input">
            <button class="search-button">
                <img src="{{ url_for('static', filename='photos/search.png') }}" alt="Search Icon" style="width:30px;height:30px;">
            </button>
        </form>
        
        <div class="user-portfolio">
            <a href="/profile" class="user-icon" style="text-decoration: none;">
                <img src="{{ url_for('static', filename='photos/user-icon.png') }}" alt="Profile Icon">
            </a>

            <a href="/cart" class="shopping-bag" style="text-decoration: none;">
                <img src="{{ url_for('static', filename='photos/shopping-bag.png') }}" alt="Cart Icon">
            </a>
        </div>
        
    </div>
    {% block body %}
    {% endblock %}
</body>
</html>
