<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

</head>


<body>
    <div class="nav">
        <a href="/home">
            <img src="{{ url_for('static', filename='css/photos/mmu-logo.png')}}" alt="MMU Logo" class="logo">
        </a>

        <div class="user-portfolio">
            <a href="/home" class="home-icon" style="text-decoration: none;">
                <img src="{{ url_for('static', filename='css/photos/home.png') }}" alt="Home Icon">
            </a>

            <a href="/profile" class="user-icon" style="text-decoration: none;">
                <img src="{{ url_for('static', filename='css/photos/user-icon.png') }}" alt="Profile Icon">
            </a>

        </div>
</div>

<body>
    <div class="chat-container">
        <div class="message-container">
            <div class="message sender-message">Hello there!</div>
            <div class="message receiver-message">Hi! How can I help you today?</div>
            <div class="message sender-message">I have a question about your products.</div>
            <div class="message receiver-message">Sure, feel free to ask!</div>
        </div>
        
        <div class="message">
            <input type="text" 
                placeholder="Type your message...">
            <button>Send</button>
        </div>
    </div>



</body>
</html>
