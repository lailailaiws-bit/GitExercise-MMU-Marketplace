{% extends "chat.html" %}

{% block title %}Select a User to Chat with !{% endblock %}

{% block content %}
<div class="justify-center px-10 py-10 ">
    <h2>Start a Conversation</h2>
    <ul>
        {% for user in users %}
            <li class="bg-blue-400">
                <strong>{{ user.username }}</strong>
                <a href="{{ url_for('chat_with', target_username=user.username) }}" style="float: right; text-decoration: none; color: blue;">Message</a>
            </li>
        {% else %}
            <p>No other users are registered yet.</p>
        {% endfor %}
    </ul>
</div>
{% endblock %}
