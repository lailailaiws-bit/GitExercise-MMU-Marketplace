{% extends "chat.html" %}

{% block title %}Select a User to Chat{% endblock %}

{% block content %}
<div class="chat-container">
    <h2>Start a Conversation</h2>
    <ul>
        {% for user in users %}
            <li style="margin: 10px 0; padding: 10px; background: #f4f4f4; border-radius: 5px;">
                <strong>{{ user.username }}</strong>
                <a href="{{ url_for('chat_with', target_username=user.username) }}" style="float: right; text-decoration: none; color: blue;">Message</a>
            </li>
        {% else %}
            <p>No other users are registered yet.</p>
        {% endfor %}
    </ul>
</div>
{% endblock %}
