{% extends "chat.html" %}

{% block title %}Select a User to Chat with !{% endblock %}

{% block content %}

<div class="justify-left px-10 pt-2 pb-10 ">
    <h2 class=" text-xl font-bold py-2">Start a Conversation for enquiries !</h2>
    <ul>
        {% for user in users %}
            <li class=" cols-2 px-5 py-2 mx-5 my-5 border-2 max-w-xs rounded-lg bg-gray-200 flex justify-between items-center">
                <strong>{{ user.username }}</strong>
                <a href="{{ url_for('chat_with', target_username=user.username) }}" class=" text-xs border border-gray-400 bg-white rounded-md px-3 py-2 hover:bg-gray-100 transition ">Message</a>
            </li>
        {% else %}
            <p>No other users are registered yet.</p>
        {% endfor %}
    </ul>
</div>
{% endblock %}
