<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='css/profile.css')}}">
    <title>Profile</title>
</head>
<body>
{% include 'header.html' %}
    
<div class="main_container">
    <div class="profile_block">
        <div class="block_1">
            <a class="profile_title">My Account</a>
            <div class="wrapper">
                <div class="profile_pic">
                    <img src="{{url_for('static', filename='css/photos/' + current_user.profile_pic)}}">
                </div>
                <div class="info_block">
                    <div class="username_block">
                         <label class="username_label">Username:</label>
                        <p class="username">{{current_user.username}}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
